name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: black --check
        run: black --check .

      - name: flake8
        run: flake8 .

      - name: mypy
        # TODO: remove continue-on-error once tools.py/agent.py are implemented.
        # tools.py stubs (return-annotated functions with just `pass`) fail the
        # empty-body check, and agent.py's `agent = ...` makes main.py's
        # agent.stream() call untyped — both are real signals, not config bugs.
        continue-on-error: true
        run: mypy .

      - name: pytest
        # Exit code 5 = "no tests collected". Tolerated until tests/ exists;
        # any other non-zero exit still fails the build normally.
        run: pytest || [ "$?" -eq 5 ]
