[tool.black]
line-length = 88
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
exclude = '^(\.venv|venv|output|example_output)/'

[tool.pytest.ini_options]
testpaths = ["tests"]
